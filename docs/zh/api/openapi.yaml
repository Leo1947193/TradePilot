openapi: 3.0.3
info:
  title: TradePilot API
  version: 1.0.0
  description: |
    TradePilot 对外 HTTP API。

    实现层使用 LangGraph 编排分析流程，但对外仅暴露稳定的 JSON 契约。
servers:
  - url: /
tags:
  - name: Analyses
    description: 结构化股票分析接口
paths:
  /api/v1/analyses:
    post:
      tags:
        - Analyses
      summary: 生成股票结构化分析
      description: 输入股票代码，返回完整的结构化分析、决策综合结果与交易计划。
      operationId: createAnalysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
            example:
              ticker: AAPL
      responses:
        '200':
          description: 分析成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '400':
          description: 请求非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invalid_request
                  message: ticker is required
                  details:
                    - field: ticker
                      reason: missing
        '404':
          description: 股票代码不受支持或无法识别
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: ticker_not_supported
                  message: ticker is not supported
        '422':
          description: 数据不足，无法形成最小分析上下文
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: insufficient_data
                  message: insufficient data to build analysis context
        '503':
          description: 关键上游数据源不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: upstream_unavailable
                  message: required upstream data source is unavailable
        '500':
          description: 服务端内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AnalyzeRequest:
      type: object
      additionalProperties: false
      required:
        - ticker
      properties:
        ticker:
          type: string
          description: 股票代码。服务端应先 trim 再校验。
          minLength: 1
          example: AAPL
    AnalysisResponse:
      type: object
      additionalProperties: false
      required:
        - ticker
        - analysis_time
        - technical_analysis
        - fundamental_analysis
        - sentiment_expectations
        - event_driven_analysis
        - decision_synthesis
        - trade_plan
        - sources
      properties:
        ticker:
          type: string
          description: 标准化后的股票代码
          example: AAPL
        analysis_time:
          type: string
          format: date-time
          description: 本次输出生成时间
          example: '2026-04-16T08:30:00Z'
        technical_analysis:
          $ref: '#/components/schemas/TechnicalAnalysis'
        fundamental_analysis:
          $ref: '#/components/schemas/FundamentalAnalysis'
        sentiment_expectations:
          $ref: '#/components/schemas/SentimentExpectations'
        event_driven_analysis:
          $ref: '#/components/schemas/EventDrivenAnalysis'
        decision_synthesis:
          $ref: '#/components/schemas/DecisionSynthesis'
        trade_plan:
          $ref: '#/components/schemas/TradePlan'
        sources:
          type: array
          description: 本次分析使用的数据来源
          items:
            $ref: '#/components/schemas/Source'
    TechnicalAnalysis:
      type: object
      additionalProperties: false
      required:
        - technical_signal
        - trend
        - key_support
        - key_resistance
        - volume_pattern
        - momentum
        - risk_flags
        - setup_state
        - technical_summary
      properties:
        technical_signal:
          type: string
          enum: [bullish, neutral, bearish]
        trend:
          type: string
          enum: [bullish, neutral, bearish]
        key_support:
          type: array
          items:
            type: number
        key_resistance:
          type: array
          items:
            type: number
        volume_pattern:
          type: string
          enum: [accumulation, distribution, neutral, pullback_healthy, bounce_weak]
        momentum:
          type: string
        entry_trigger:
          type: string
        target_price:
          type: number
        stop_loss_price:
          type: number
        risk_reward_ratio:
          type: number
        risk_flags:
          type: array
          items:
            type: string
        setup_state:
          type: string
          enum: [actionable, watch, avoid]
        technical_summary:
          type: string
    FundamentalAnalysis:
      type: object
      additionalProperties: false
      required:
        - fundamental_bias
        - composite_score
        - growth
        - valuation_view
        - business_quality
        - key_risks
        - data_completeness_pct
        - fundamental_summary
      properties:
        fundamental_bias:
          type: string
          enum: [bullish, neutral, bearish, disqualified]
        composite_score:
          type: number
        growth:
          type: string
        valuation_view:
          type: string
        business_quality:
          type: string
        key_risks:
          type: array
          items:
            type: string
        data_completeness_pct:
          type: number
          minimum: 0
          maximum: 100
        fundamental_summary:
          type: string
    SentimentExpectations:
      type: object
      additionalProperties: false
      required:
        - sentiment_bias
        - news_tone
        - market_expectation
        - key_risks
        - data_completeness_pct
      properties:
        sentiment_bias:
          type: string
          enum: [bullish, neutral, bearish]
        news_tone:
          type: string
          enum: [positive, neutral, negative]
        market_expectation:
          type: string
        key_risks:
          type: array
          items:
            type: string
        data_completeness_pct:
          type: number
          minimum: 0
          maximum: 100
        sentiment_summary:
          type: string
    EventDrivenAnalysis:
      type: object
      additionalProperties: false
      required:
        - event_bias
        - upcoming_catalysts
        - risk_events
        - event_risk_flags
        - data_completeness_pct
      properties:
        event_bias:
          type: string
          enum: [bullish, neutral, bearish]
        upcoming_catalysts:
          type: array
          items:
            type: string
        risk_events:
          type: array
          items:
            type: string
        event_risk_flags:
          type: array
          items:
            type: string
            enum:
              - binary_event_imminent
              - earnings_within_3d
              - regulatory_decision_imminent
              - macro_event_high_sensitivity
        data_completeness_pct:
          type: number
          minimum: 0
          maximum: 100
        event_summary:
          type: string
    DecisionSynthesis:
      type: object
      additionalProperties: false
      required:
        - overall_bias
        - bias_score
        - confidence_score
        - actionability_state
        - conflict_state
        - data_completeness_pct
        - weight_scheme_used
        - blocking_flags
        - module_contributions
        - risks
      properties:
        overall_bias:
          type: string
          enum: [bullish, neutral, bearish]
        bias_score:
          type: number
          minimum: -1
          maximum: 1
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        actionability_state:
          type: string
          enum: [actionable, watch, avoid]
        conflict_state:
          type: string
          enum: [aligned, mixed, conflicted]
        data_completeness_pct:
          type: number
          minimum: 0
          maximum: 100
        weight_scheme_used:
          $ref: '#/components/schemas/WeightSchemeUsed'
        blocking_flags:
          type: array
          items:
            type: string
        module_contributions:
          type: array
          minItems: 4
          maxItems: 4
          items:
            $ref: '#/components/schemas/ModuleContribution'
        risks:
          type: array
          items:
            type: string
    WeightSchemeUsed:
      type: object
      additionalProperties: false
      required:
        - configured_weights
        - enabled_modules
        - disabled_modules
        - enabled_weight_sum
        - available_weight_sum
        - available_weight_ratio
        - applied_weights
        - renormalized
      properties:
        configured_weights:
          $ref: '#/components/schemas/ConfiguredWeights'
        enabled_modules:
          type: array
          items:
            type: string
            enum: [technical, fundamental, sentiment, event]
        disabled_modules:
          type: array
          items:
            type: string
            enum: [technical, fundamental, sentiment, event]
        enabled_weight_sum:
          type: number
        available_weight_sum:
          type: number
        available_weight_ratio:
          type: number
        applied_weights:
          $ref: '#/components/schemas/AppliedWeights'
        renormalized:
          type: boolean
    ConfiguredWeights:
      type: object
      additionalProperties: false
      required:
        - technical
        - fundamental
        - sentiment
        - event
      properties:
        technical:
          type: number
        fundamental:
          type: number
        sentiment:
          type: number
        event:
          type: number
    AppliedWeights:
      type: object
      additionalProperties: false
      required:
        - technical
        - fundamental
        - sentiment
        - event
      properties:
        technical:
          type: number
          nullable: true
        fundamental:
          type: number
          nullable: true
        sentiment:
          type: number
          nullable: true
        event:
          type: number
          nullable: true
    ModuleContribution:
      type: object
      additionalProperties: false
      required:
        - module
        - enabled
        - status
        - direction
        - direction_value
        - configured_weight
        - applied_weight
        - contribution
        - data_completeness_pct
        - low_confidence
      properties:
        module:
          type: string
          enum: [technical, fundamental, sentiment, event]
        enabled:
          type: boolean
        status:
          type: string
          enum: [usable, degraded, excluded, not_enabled]
        direction:
          type: string
          enum: [bullish, neutral, bearish, disqualified]
        direction_value:
          type: integer
          enum: [-1, 0, 1]
        configured_weight:
          type: number
        applied_weight:
          type: number
          nullable: true
        contribution:
          type: number
          nullable: true
        data_completeness_pct:
          type: number
          nullable: true
        low_confidence:
          type: boolean
    TradePlan:
      type: object
      additionalProperties: false
      required:
        - overall_bias
        - bullish_scenario
        - bearish_scenario
        - do_not_trade_conditions
      properties:
        overall_bias:
          type: string
          enum: [bullish, neutral, bearish]
        bullish_scenario:
          $ref: '#/components/schemas/TradeScenario'
        bearish_scenario:
          $ref: '#/components/schemas/TradeScenario'
        do_not_trade_conditions:
          type: array
          items:
            type: string
    TradeScenario:
      type: object
      additionalProperties: false
      required:
        - entry_idea
        - take_profit
        - stop_loss
      properties:
        entry_idea:
          type: string
        take_profit:
          type: string
        stop_loss:
          type: string
    Source:
      type: object
      additionalProperties: false
      required:
        - type
        - name
        - url
      properties:
        type:
          type: string
          enum: [technical, financial, news, macro, event]
        name:
          type: string
        url:
          type: string
          format: uri
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
        - field
        - reason
      properties:
        field:
          type: string
        reason:
          type: string
